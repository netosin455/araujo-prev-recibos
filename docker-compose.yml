services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: araujo_prev
      POSTGRES_USER: araujo
      POSTGRES_PASSWORD: araujo_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U araujo -d araujo_prev"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: "postgresql://araujo:araujo_dev@db:5432/araujo_prev?sslmode=disable"
      JWT_SECRET: "dev-secret-change-in-production"
      NODE_ENV: "development"
      BUCKET_NAME: ""
      DATA_DIR: "/app/data"
    volumes:
      - ./web:/app
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "--watch", "server.js"]

volumes:
  pgdata:
