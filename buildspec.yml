version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - cd web && npm install --production
  post_build:
    commands:
      - echo '==> Deploy da Lambda export-worker...'
      - cd $CODEBUILD_SRC_DIR/lambda/export-worker
      - npm ci --production && npm run build && (rm -f function.zip; zip -r function.zip . -x "*.zip" -x "*.git*" -q) && aws lambda update-function-code --function-name araujo-prev-export-worker --zip-file fileb://function.zip && echo '==> Lambda atualizada!' || echo '==> Lambda deploy skipped (check permissions or lockfile)'

artifacts:
  base-directory: web
  files:
    - '**/*'
  exclude-paths:
    - 'data/**'
    - 'data/uploads/**'
